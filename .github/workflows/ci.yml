name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    # No AWS credentials anywhere in this job, deliberately — PR-triggered
    # runs can never get standing account access. See docs/ci-cd.md.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run typecheck lint build

      - run: pnpm run format:check
