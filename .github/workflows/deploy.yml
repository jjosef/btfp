name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck lint build
      - run: pnpm run format:check

      # Uploaded once here and reused by every later job — the whole point
      # of this pipeline is that dev and prod run the exact same build, not
      # two separate builds of the same source. See docs/ci-cd.md.
      - uses: actions/upload-artifact@v4
        with:
          name: bff-dist
          path: apps/bff/dist
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      BTFP_HOSTED_ZONE_ID: ${{ vars.BTFP_HOSTED_ZONE_ID }}
      BTFP_DEV_BASIC_AUTH_USER: ${{ secrets.BTFP_DEV_BASIC_AUTH_USER }}
      BTFP_DEV_BASIC_AUTH_PASSWORD: ${{ secrets.BTFP_DEV_BASIC_AUTH_PASSWORD }}
      BTFP_DEV_JWT_SECRET: ${{ secrets.BTFP_DEV_JWT_SECRET }}
      BTFP_PROD_JWT_SECRET: ${{ secrets.BTFP_PROD_JWT_SECRET }}
      BTFP_BRAVE_SEARCH_API_KEY: ${{ secrets.BTFP_BRAVE_SEARCH_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: bff-dist
          path: apps/bff/dist
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Docker build+push happens automatically inside this call (the BFF
      # Lambda is DockerImageCode.fromImageAsset — see api-stack.ts). Not
      # prerendered: dev is Basic-Auth-walled and noindex, never meant to be
      # crawled — see docs/seo.md.
      - name: cdk deploy BtfpDev
        working-directory: infra/cdk
        run: npx cdk deploy 'BtfpDev/*' --require-approval never

  e2e:
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @btfp/e2e exec playwright install --with-deps chromium

      # The exact invocation docs/e2e-testing.md already documents running
      # by hand — now automated. Note: this permanently accumulates test
      # data (a submitted thing, a signed-up user) in dev's real DynamoDB
      # tables on every run — an accepted tradeoff, see docs/ci-cd.md.
      - name: Run e2e against dev
        working-directory: apps/e2e
        env:
          BASE_URL: https://dev.badthingsforpets.com
          BASIC_AUTH_USER: ${{ secrets.BTFP_DEV_BASIC_AUTH_USER }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BTFP_DEV_BASIC_AUTH_PASSWORD }}
        run: pnpm test

  prod-diff:
    needs: e2e
    runs-on: ubuntu-latest
    # Deliberately NOT gated by the `production` environment — this job
    # exists so the diff is visible in the Actions run *before* a reviewer
    # decides whether to approve deploy-prod, not alongside it. A diff
    # computed inside the gated job itself would only become visible after
    # the deploy already ran, which defeats the point. See docs/ci-cd.md.
    permissions:
      id-token: write
      contents: read
    env:
      BTFP_HOSTED_ZONE_ID: ${{ vars.BTFP_HOSTED_ZONE_ID }}
      BTFP_DEV_BASIC_AUTH_USER: ${{ secrets.BTFP_DEV_BASIC_AUTH_USER }}
      BTFP_DEV_BASIC_AUTH_PASSWORD: ${{ secrets.BTFP_DEV_BASIC_AUTH_PASSWORD }}
      BTFP_DEV_JWT_SECRET: ${{ secrets.BTFP_DEV_JWT_SECRET }}
      BTFP_PROD_JWT_SECRET: ${{ secrets.BTFP_PROD_JWT_SECRET }}
      BTFP_BRAVE_SEARCH_API_KEY: ${{ secrets.BTFP_BRAVE_SEARCH_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: bff-dist
          path: apps/bff/dist

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: cdk diff BtfpProd
        working-directory: infra/cdk
        run: |
          echo '## BtfpProd diff' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx cdk diff 'BtfpProd/*' >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    needs: prod-diff
    runs-on: ubuntu-latest
    # The real prod safety gate: a GitHub Environment with a required
    # reviewer (configured once in repo settings, not in this file — see
    # docs/ci-cd.md). This job doesn't start running at all until someone
    # approves, and by then prod-diff's summary above is already visible.
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      BTFP_HOSTED_ZONE_ID: ${{ vars.BTFP_HOSTED_ZONE_ID }}
      BTFP_DEV_BASIC_AUTH_USER: ${{ secrets.BTFP_DEV_BASIC_AUTH_USER }}
      BTFP_DEV_BASIC_AUTH_PASSWORD: ${{ secrets.BTFP_DEV_BASIC_AUTH_PASSWORD }}
      BTFP_DEV_JWT_SECRET: ${{ secrets.BTFP_DEV_JWT_SECRET }}
      BTFP_PROD_JWT_SECRET: ${{ secrets.BTFP_PROD_JWT_SECRET }}
      BTFP_BRAVE_SEARCH_API_KEY: ${{ secrets.BTFP_BRAVE_SEARCH_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Same artifacts the build job produced and dev already ran — a real
      # promotion, not a rebuild. See docs/ci-cd.md.
      - uses: actions/download-artifact@v4
        with:
          name: bff-dist
          path: apps/bff/dist
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      # NOT part of either artifact: apps/web/dist is already a self-contained
      # bundle (vite inlines its dependencies at build time), so it doesn't
      # need this. But prerender.mjs below runs as a plain Node script
      # (import slugify from '@btfp/shared-types'), resolved at runtime via
      # the pnpm workspace symlink — which points at this package's source
      # checkout, not the artifact. `pnpm install` alone only wires up the
      # symlink; without this, `dist/index.js` doesn't exist yet.
      - run: pnpm --filter @btfp/shared-types build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: cdk deploy BtfpProd
        working-directory: infra/cdk
        run: npx cdk deploy 'BtfpProd/*' --require-approval never

      # Two-pass: apps/web/dist deployed above is the generic (unprerendered)
      # shell. Now that BtfpProd/Api is live, crawl it for real per-route
      # HTML and re-deploy Web to sync those files — mirrors docs/infra.md's
      # existing manual step 9. If this step fails, prod is left running new
      # API/DB code with stale web assets — a visible (red job), not
      # silent, accepted risk; see docs/ci-cd.md for the manual recovery
      # path.
      - run: pnpm --filter @btfp/web exec playwright install --with-deps chromium
      - name: Prerender against live prod API
        working-directory: apps/web
        env:
          PRERENDER_API_ORIGIN: https://badthingsforpets.com
        run: pnpm run prerender

      - name: cdk deploy BtfpProd/Web (sync prerendered assets)
        working-directory: infra/cdk
        run: npx cdk deploy BtfpProd/Web --require-approval never
